<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Text to VSL - Ngôn ngữ ký hiệu Việt Nam</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');
        
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #121212 0%, #2c2c2c 100%);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 1100px;
            transition: transform 0.3s ease;
        }
        
        .glass-panel:hover {
            transform: translateY(-5px);
        }

        .title-gradient {
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
            text-align: center;
            margin-bottom: 40px;
        }

        .search-input {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 20px;
            color: white;
            font-size: 1.2rem;
            transition: all 0.3s ease;
            resize: none;
        }

        .search-input:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: #38bdf8;
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.2);
            color: white;
            outline: none;
        }
        
        .search-input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .btn-translate {
            background: linear-gradient(to right, #3b82f6, #6366f1);
            border: none;
            border-radius: 16px;
            padding: 15px 35px;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .btn-translate:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 20px -10px rgba(99, 102, 241, 0.8);
        }

        .result-container {
            display: none;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            height: 100%;
        }

        .animation-frame {
            border-radius: 12px;
            max-width: 100%;
            height: auto;
            max-height: 300px;
            object-fit: contain;
            box-shadow: 0 10px 30px -5px rgba(0,0,0,0.5);
            border: 2px solid rgba(255, 255, 255, 0.1);
            background: black;
        }

        .word-badge {
            display: inline-block;
            background: rgba(56, 189, 248, 0.2);
            color: #38bdf8;
            padding: 8px 25px;
            border-radius: 30px;
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 20px;
            border: 1px solid rgba(56, 189, 248, 0.3);
            text-transform: uppercase;
        }

        /* Loading Spinner */
        .spinner-container {
            display: none;
            text-align: center;
            margin: 30px 0;
        }

        .error-message {
            display: none;
            color: #f87171;
            background: rgba(248, 113, 113, 0.1);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(248, 113, 113, 0.3);
            text-align: center;
            margin-top: 20px;
        }
        
        .min-h-column {
            min-height: 450px;
        }
        
        /* Custom scrollbar cho textarea */
        textarea::-webkit-scrollbar {
            width: 8px;
        }
        textarea::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05); 
            border-radius: 10px;
        }
        textarea::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2); 
            border-radius: 10px;
        }
        textarea::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3); 
        }
    </style>
</head>
<body>

    <div class="glass-panel">
        <h1 class="title-gradient"><i class="fa-solid fa-hands-asl-interpreting me-3"></i>AI Text to Sign Language</h1>
        
        <div class="row gx-5 mt-4">
            <!-- CỘT TRÁI: NHẬP TEXT -->
            <div class="col-md-5 border-end border-secondary border-opacity-25 min-h-column d-flex flex-column">
                <h5 class="mb-3 text-info fw-semibold"><i class="fa-solid fa-keyboard me-2"></i>Nhập văn bản</h5>
                <form id="translateForm" class="d-flex flex-column flex-grow-1">
                    {% csrf_token %}
                    <div class="mb-4 flex-grow-1">
                        <textarea class="form-control search-input w-100" style="height: 120px" id="wordInput" name="text" placeholder="Gõ từ vựng cần dịch vào đây...&#10;(Ví dụ: Xin chào, Anh, Bác, Ti vi)" required autocomplete="off"></textarea>
                    </div>

                    <!-- Tùy chỉnh Tốc độ -->
                    <div class="mb-4 text-center">
                        <h6 class="text-light opacity-75 mb-3"><i class="fa-solid fa-gauge-high me-2"></i>Tốc độ múa</h6>
                        <div class="btn-group w-100" role="group">
                            <input type="radio" class="btn-check" name="speedOption" id="speed05" value="0.5">
                            <label class="btn btn-outline-info" for="speed05">0.5x</label>

                            <input type="radio" class="btn-check" name="speedOption" id="speed10" value="1.0" checked>
                            <label class="btn btn-outline-info" for="speed10">1.0x (Chuẩn)</label>

                            <input type="radio" class="btn-check" name="speedOption" id="speed15" value="1.5">
                            <label class="btn btn-outline-info" for="speed15">1.5x</label>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary btn-translate mt-auto">
                        <i class="fa-solid fa-wand-magic-sparkles me-2"></i> Chuyển sang Ký hiệu
                    </button>
                </form>

                <div class="mt-4 text-center border-top border-secondary border-opacity-25 pt-4">
                    <a href="{% url 'dictionary' %}" class="btn btn-outline-info rounded-pill px-4 py-2">
                        <i class="fa-solid fa-book me-2"></i>Xem Từ Điển Ký Hiệu
                    </a>
                </div>
            </div>

            <!-- CỘT PHẢI: KẾT QUẢ DỊCH -->
            <div class="col-md-7 ps-md-4 min-h-column d-flex flex-column justify-content-center">
                <h5 class="mb-3 text-success fw-semibold align-self-start w-100"><i class="fa-solid fa-video me-2"></i>Kết quả mô phỏng</h5>
                
                <!-- Trạng thái mặc định -->
                <div id="defaultInstruction" class="text-center opacity-50 my-auto w-100">
                    <i class="fa-solid fa-hand-sparkles display-1 mb-4 mt-4"></i>
                    <p class="fs-5">Video khung xương sẽ hiển thị tại đây.</p>
                </div>

                <!-- Loading -->
                <div class="spinner-container w-100" id="loadingSpinner">
                    <div class="spinner-border text-info" style="width: 3.5rem; height: 3.5rem;" role="status">
                        <span class="visually-hidden">Đang dịch...</span>
                    </div>
                    <p class="mt-3 text-info fs-5">AI đang vẽ khung xương (Matplotlib). Vui lòng đợi...</p>
                </div>

                <!-- Error Box -->
                <div class="error-message w-100" id="errorBox">
                    <i class="fa-solid fa-triangle-exclamation me-2"></i> <span id="errorText">Lỗi không xác định</span>
                </div>

                <!-- Result Box -->
                <div class="result-container w-100 mt-0" id="resultBox">
                    <div class="word-badge" id="resultWord">Từ vựng</div>
                    <div>
                        <img src="" alt="Sign Language Animation" class="animation-frame" id="animationImg">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $(document).ready(function() {
            // Khi ấn Enter trong textarea sẽ tự submit form thay vì xuống dòng
            $('#wordInput').keypress(function (e) {
                if (e.which == 13 && !e.shiftKey) {
                    e.preventDefault();
                    $('#translateForm').submit();
                }
            });

            // Tự động dịch nếu có query parameter 'word'
            let urlParams = new URLSearchParams(window.location.search);
            let wordParam = urlParams.get('word');
            if (wordParam) {
                $('#wordInput').val(wordParam);
                // Xóa param khỏi URL mà không load lại trang để tránh lỗi loop
                window.history.replaceState({}, document.title, window.location.pathname);
                setTimeout(() => {
                    $('#translateForm').submit();
                }, 500); // Đợi 1 tí để UI render xong
            }

            $('#translateForm').on('submit', function(e) {
                e.preventDefault();
                
                let text = $('#wordInput').val();
                let speed = $('input[name="speedOption"]:checked').val();
                let csrfToken = $('[name=csrfmiddlewaretoken]').val();
                
                // Ẩn tất cả và hiện loading
                $('#defaultInstruction').hide();
                $('#resultBox').hide();
                $('#errorBox').hide();
                $('#loadingSpinner').fadeIn();
                
                $.ajax({
                    url: '{% url "translate_text" %}',
                    type: 'POST',
                    data: {
                        'text': text,
                        'speed': speed,
                        'csrfmiddlewaretoken': csrfToken
                    },
                    success: function(response) {
                        $('#loadingSpinner').hide();
                        
                        if (response.success) {
                            $('#resultWord').text(response.word);
                            // Thêm timestamp để ép trình duyệt load lại ảnh GIF mới
                            let imageUrl = response.video_url + "?t=" + new Date().getTime();
                            $('#animationImg').attr('src', imageUrl);
                            $('#resultBox').fadeIn();
                        } else {
                            $('#errorText').text(response.error);
                            $('#errorBox').fadeIn();
                        }
                    },
                    error: function() {
                        $('#loadingSpinner').hide();
                        $('#errorText').text("Lỗi kết nối máy chủ. Vui lòng thử lại.");
                        $('#errorBox').fadeIn();
                    }
                });
            });
        });
    </script>
</body>
</html>
