<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Từ điển Ký hiệu - AI Text to VSL</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');
        
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #121212 0%, #2c2c2c 100%);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 1100px;
        }

        .title-gradient {
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
            text-align: center;
            margin-bottom: 30px;
        }

        .vocab-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .vocab-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            color: white;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 60px;
        }

        .vocab-item:hover {
            background: rgba(56, 189, 248, 0.2);
            border-color: #38bdf8;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px -10px rgba(56, 189, 248, 0.5);
            color: white;
        }

        .btn-back {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            padding: 10px 25px;
            text-decoration: none;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            margin-bottom: 20px;
        }

        .btn-back:hover {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }
    </style>
</head>
<body>

    <div class="glass-panel">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <a href="{% url 'index' %}" class="btn-back">
                <i class="fa-solid fa-arrow-left me-2"></i>Quay lại trang dịch
            </a>
            <div class="text-light opacity-75">
                <i class="fa-solid fa-layer-group me-2"></i>Tổng số: {{ vocabs.count }} từ vựng
            </div>
        </div>

        <h1 class="title-gradient"><i class="fa-solid fa-book-open-reader me-3"></i>Từ Điển Ký Hiệu</h1>
        
        <p class="text-center text-light opacity-75 mb-5">Click vào một từ vựng bất kỳ để xem hệ thống mô phỏng ngôn ngữ ký hiệu.</p>

        <div class="vocab-grid">
            {% for v in vocabs %}
            <a href="{% url 'index' %}?word={{ v.word|urlencode }}" class="vocab-item">
                {{ v.display_word }}
            </a>
            {% empty %}
            <div class="col-12 text-center text-muted fst-italic">
                Chưa có dữ liệu từ vựng trong Database.
            </div>
            {% endfor %}
        </div>
    </div>

</body>
</html>
